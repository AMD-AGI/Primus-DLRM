data:
  dataset_size: "5b"
  data_dir: "data"
  use_cache: true
  history_length: 500
  history_mode: "last_l"
  num_workers: 8
  prefetch_factor: 4
  enable_counters: true
  counter_windows_days: [7, 30]
  schema: schemas/yambda.yaml

model:
  model_type: "onetrans"
  embedding_dim: 64
  embedding_init: "uniform"
  transformer:
    d_model: 384
    n_heads: 6
    n_layers: 8
    ffn_mult: 4
    n_ns_tokens: 16
    use_pyramid: true
    dropout: 0.0
    pos_embed: true
  embedding_tables:
    - { name: item,   features: [item, hist_lp_item, hist_like_item, hist_skip_item],       num_embeddings: 9390624 }
    - { name: artist, features: [artist, hist_lp_artist, hist_like_artist, hist_skip_artist], num_embeddings: 1293395 }
    - { name: album,  features: [album, hist_lp_album, hist_like_album, hist_skip_album],    num_embeddings: 3367692 }
    - { name: uid,    features: [uid],                                                        num_embeddings: 1000001 }

  # Each spec auto-registers an EmbeddingCollection table, a scalar feature, and a
  # batch_to_feature/kjt_feature_order entry on Config.load(). Toggle
  # individual crosses on/off via the per-spec ``enabled`` flag.
  # num_embeddings sets the embedding-table row count and the hash modulus
  # together; when num_embeddings < unique cross-product cardinality the cross
  # is "hashed-truncated" (multiple unique pairs share rows, table acts as a
  # memorization shortcut), otherwise it is "unique-covered" (no collisions
  # beyond xxhash birthday probability).
  cross_features:
    - { name: user_x_artist,        keys: [uid, artist_id],              num_embeddings: 100000000 }  # hashed   (unique=1.29T)
    - { name: user_x_album,         keys: [uid, album_id],               num_embeddings:  40000000 }  # hashed   (unique=3.37T)
    - { name: user_x_hour,          keys: [uid, hour_of_day],            num_embeddings:  24000000 }  # unique   (1M x 24)
    - { name: item_x_hour,          keys: [item_id, hour_of_day],        num_embeddings:  40000000 }  # hashed   (unique=225M)
    - { name: artist_x_hour,        keys: [artist_id, hour_of_day],      num_embeddings:  32000000 }  # unique   (1.29M x 24, padded)
    - { name: user_x_is_organic,    keys: [uid, is_organic],             num_embeddings:   2000000 }  # unique   (1M x 2)
    - { name: user_x_artist_x_hour, keys: [uid, artist_id, hour_of_day], num_embeddings:  40000000 }  # hashed   (unique=31T)

feature:
  sequence_groups:
    hist_lp: [hist_lp_item, hist_lp_artist, hist_lp_album]
    hist_like: [hist_like_item, hist_like_artist, hist_like_album]
    hist_skip: [hist_skip_item, hist_skip_artist, hist_skip_album]
  scalar_features: [uid, item, artist, album]
  dense_features:
    - { name: audio_embed, dim: 128, project: true, activation: gelu }
    - { name: user_counters, dim: 6, project: false }
    - { name: item_counters, dim: 6, project: false }
    - { name: cross_counters, dim: 18, project: true, activation: relu }

train:
  attention_impl: turbo
  torch_compile: true
  dense_optimizer: shampoo
  shampoo_precondition_frequency: 500
  shampoo_use_ddp_distributed_config: true
  shampoo_ddp_num_trainers_per_group: -1
  shampoo_ddp_communicate_params: false
  shuffle: false
  batch_size: 8192
  lr: 0.0003
  weight_decay: 0.00001
  epochs: 1
  warmup_steps: 100
  bf16: true
  grad_clip: 1.0
  log_interval: 10
  eval_interval: 1
  checkpoint_dir: "results"
  save_checkpoint: false
  seed: 42
  loss_weights:
    listen_plus: 1.0
  contrastive_weight: 0.0
  contrastive_temperature: 0.1

distributed:
  enabled: true
  dense_strategy: "ddp"
  num_nodes: 1
  gpus_per_node: 8

  embedding_sharding:
    strategy: auto
    topology:
      hbm_cap_gb: 260
