data:
  dataset_size: "50m"
  history_length: 20
  history_mode: "last_l"
  num_workers: 4
  enable_counters: true
  counter_windows_days: [7, 30]
  data_dir: "data"
  schema: schemas/yambda.yaml

feature:
  sequence_groups:
    hist_lp: [hist_lp_item, hist_lp_artist, hist_lp_album]
    hist_like: [hist_like_item, hist_like_artist, hist_like_album]
    hist_skip: [hist_skip_item, hist_skip_artist, hist_skip_album]
  scalar_features: [uid, item, artist, album]
  dense_features:
    - { name: audio_embed, dim: 128, project: true, activation: gelu }
    - { name: user_counters, dim: 6, project: false, tower: user }
    - { name: item_counters, dim: 6, project: false, tower: item }
    - { name: cross_counters, dim: 18, project: true, activation: relu }

model:
  model_type: "dlrm"
  embedding_dim: 16
  interaction_type: "dcnv2"
  dcn_num_cross_layers: 3
  bottom_mlp_dims: [64]
  top_mlp_dims: [128, 64]
  dropout: 0.1
  embedding_tables:
    - { name: hist_item,   features: [hist_lp_item, hist_like_item, hist_skip_item],             num_embeddings: 9390624, pooling: mean }
    - { name: item,        features: [item],                                                      num_embeddings: 9390624 }
    - { name: hist_artist, features: [hist_lp_artist, hist_like_artist, hist_skip_artist],        num_embeddings: 1293395, pooling: mean }
    - { name: artist,      features: [artist],                                                    num_embeddings: 1293395 }
    - { name: hist_album,  features: [hist_lp_album, hist_like_album, hist_skip_album],           num_embeddings: 3367692, pooling: mean }
    - { name: album,       features: [album],                                                     num_embeddings: 3367692 }
    - { name: uid,         features: [uid],                                                       num_embeddings: 1000001 }

train:
  batch_size: 32768
  lr: 0.001
  weight_decay: 0.00001
  epochs: 1
  warmup_steps: 1000
  bf16: true
  grad_clip: 1.0
  log_interval: 10
  eval_interval: 1
  checkpoint_dir: "results"
  seed: 42
  loss_weights:
    listen_plus: 1.0

distributed:
  enabled: true
  dense_strategy: "ddp"
  num_nodes: 1
  gpus_per_node: 8
