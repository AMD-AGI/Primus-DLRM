data:
  dataset_size: "50m"
  history_length: 20
  history_mode: "last_l"
  num_workers: 4
  enable_counters: true
  counter_windows_days: [30]
  data_dir: "data"
  schema_file: schemas/yambda.yaml
  schema:
    dense_features:
      - { name: audio_embed, dim: 128, project: true, activation: gelu }
      - { name: user_counters, dim: 3, project: false }
      - { name: item_counters, dim: 3, project: false }
      - { name: cross_counters, dim: 9, project: true, activation: relu }

model:
  embedding_dim: 16
  embedding_dim_small: 8
  interaction_type: "dcnv2"
  dcn_num_cross_layers: 3
  bottom_mlp_dims: [64]
  top_mlp_dims: [128, 64]
  dropout: 0.1

train:
  batch_size: 4096
  lr: 0.001
  weight_decay: 0.00001
  epochs: 1
  warmup_steps: 1000
  bf16: true
  grad_clip: 1.0
  log_interval: 500
  eval_interval: 1
  checkpoint_dir: "results"
  seed: 42
  loss_weights:
    listen_plus: 1.0
  contrastive_weight: 0.5
  contrastive_temperature: 0.1
