data:
  dataset_size: "50m"
  history_length: 100
  history_mode: "last_l"
  num_negatives: 4
  negative_sampler: "uniform"
  session_gap_seconds: 1800
  num_workers: 4
  enable_counters: false
  data_dir: "data"

model:
  embedding_dim: 64
  embedding_dim_small: 16
  interaction_type: "concat_mlp"
  bottom_mlp_dims: [128]
  top_mlp_dims: [256, 128]
  dropout: 0.1
  audio_embed_dim: 128

train:
  batch_size: 1024
  lr: 0.001
  embedding_lr: 0.01
  weight_decay: 0.00001
  epochs: 1
  warmup_steps: 500
  bf16: true
  grad_clip: 1.0
  log_interval: 100
  eval_interval: 1
  checkpoint_dir: "checkpoints"
  seed: 42
  loss_weights:
    listen_plus: 1.0
    like: 0.5
    dislike: 0.5
    played_ratio: 0.1
