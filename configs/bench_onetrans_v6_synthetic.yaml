data:
  dataset_size: "50m"
  history_length: 20
  history_mode: "last_l"
  num_workers: 4
  enable_counters: true
  counter_windows_days: [7, 30]
  schema_file: schemas/yambda.yaml
  synthetic:
    enabled: true
    seed: 42
    num_samples: -1
    num_prebatched: 0
    label_positive_rate: 0.3

    # 4 tables: [0]=items, [1]=artists, [2]=albums, [3]=users
    # Sizes match real Yambda 50M dataset
    embedding_tables:
      - { num_embeddings: 9390624, embedding_dim: 64 }
      - { num_embeddings: 1293395, embedding_dim: 64 }
      - { num_embeddings: 3367692, embedding_dim: 64 }
      - { num_embeddings: 1000001, embedding_dim: 64 }

model:
  model_type: "onetrans"
  embedding_dim: 64
  audio_embed_dim: 128
  embedding_init: "uniform"
  onetrans:
    d_model: 256
    n_heads: 8
    n_layers: 4
    ffn_mult: 4
    n_ns_tokens: 8
    use_pyramid: true
    dropout: 0.1
    pos_embed: true

train:
  batch_size: 32768
  lr: 0.0003
  weight_decay: 0.00001
  epochs: 1
  warmup_steps: 2000
  bf16: true
  grad_clip: 1.0
  log_interval: 10
  eval_interval: 1
  checkpoint_dir: "results"
  seed: 42
  loss_weights:
    listen_plus: 1.0
  contrastive_weight: 0.0
  contrastive_temperature: 0.1

distributed:
  enabled: true
  dense_strategy: "ddp"
  num_nodes: 1
  gpus_per_node: 8
