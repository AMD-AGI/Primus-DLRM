model:
  model_type: "dlrm"
  embedding_dim: 256
  embedding_init: "uniform"
  interaction_type: "concat_mlp"
  bottom_mlp_dims: [512, 256]
  top_mlp_dims: [512, 256]
  dropout: 0.0

train:
  batch_size: 2048
  lr: 0.01
  embedding_lr: 0.02
  embedding_optimizer: "row_wise_adagrad"
  embedding_eps: 0.0001
  weight_decay: 0.00001
  epochs: 1
  warmup_steps: 15000
  warmup_start_factor: 0.02
  sparse_warmup_steps: 60000
  sparse_warmup_value: 0.1
  # FP32 + TF32: the precision mode that triggers the NaN in the reproducer
  bf16: false
  allow_tf32: true
  grad_clip: 0.0
  log_interval: 100
  checkpoint_dir: "results"
  seed: 42
  loss_weights:
    task0: 1.0
  # Shampoo optimizer matching MI350X reproducer config exactly.
  # The BF16 factor matrix + TF32 matmuls combination triggers NaN on MI350X.
  dense_optimizer: "shampoo"
  shampoo_precondition_frequency: 1000
  shampoo_max_preconditioner_dim: 4096
  shampoo_use_bf16_factor_matrix: true
  shampoo_momentum: 0.5
  shampoo_use_nesterov: true
  shampoo_use_decoupled_weight_decay: true

distributed:
  enabled: true
  dense_strategy: "ddp"
  num_nodes: 1
  gpus_per_node: 1
