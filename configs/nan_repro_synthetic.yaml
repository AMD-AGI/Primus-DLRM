# MI350X NaN reproduction config.
#
# Emulates the standalone_single_file.py reproducer:
#   - 71 embedding tables matching the reproducer's TABLE_SPECS
#   - Embedding dim 256
#   - Batch size 2048
#   - FP32 + TF32 (no BF16 autocast) — the precision mode that triggers NaN
#   - Distributed Shampoo optimizer with precondition_frequency=1000
#   - 1 GPU, DMP pipeline
#   - Infinite synthetic data
#
# Usage:
#   bash scripts/launch_slurm_docker.sh --nnodes 1 --gpus 1 \
#       --config configs/nan_repro_synthetic.yaml \
#       --dense-strategy dmp --pipeline \
#       --run-name nan_repro --max-steps 5000 --log-interval 100

data:
  history_length: 1
  num_workers: 0
  schema_file: schemas/nan_repro.yaml
  synthetic:
    enabled: true
    seed: 42
    num_samples: -1
    num_prebatched: 16
    label_positive_rate: 0.3

    # 71 tables matching MI350X reproducer TABLE_SPECS
    # (num_features, hash_size) from standalone_single_file.py
    embedding_tables:
      - { num_embeddings: 5000000,  embedding_dim: 256 }   # t0:  43 features
      - { num_embeddings: 2000000,  embedding_dim: 256 }   # t1:  6 features
